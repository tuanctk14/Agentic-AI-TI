global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
 - "alert_rules.yml"

alerting:
  alertmanagers:
   - static_configs:
       - targets: []  # Add alertmanager:9093 when ready

scrape_configs:
 - job_name: "arguswatch-backend"
    static_configs:
     - targets: ["backend:8000"]
    metrics_path: "/metrics"

 - job_name: "arguswatch-nginx"
    static_configs:
     - targets: ["nginx:9113"]  # nginx-prometheus-exporter if added
    metrics_path: "/metrics"

 - job_name: "postgres"
    static_configs:
     - targets: ["postgres-exporter:9187"]  # postgres_exporter if added
